<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Наш Мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="auth-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s;">
    <div style="background: var(--bg-sidebar); padding: 40px; border-radius: 20px; box-shadow: var(--shadow-md); width: 90%; max-width: 350px; text-align: center;">
        <h2 style="margin-top: 0; color: var(--text-main);">E2EE Мессенджер</h2>
        <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 25px;">Ключи шифрования хранятся только на вашем устройстве</p>
        <input type="text" id="auth-username-input" placeholder="Ваш никнейм" autocomplete="off" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 16px; background: var(--input-bg); color: var(--text-main); outline: none;">
        <button id="auth-submit-btn" style="width: 100%; padding: 14px; background: var(--gradient-primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.2s;">Войти / Создать</button>
    </div>
</div>

<div class="backdrop" id="backdrop"></div>

<div class="drawer" id="drawer">
    <div class="drawer-header">
        <div class="drawer-avatar">П</div>
        <div class="drawer-user-info">
            <div class="name">Мой Профиль</div>
            <div class="phone">+1 234 567 89 00</div>
        </div>
    </div>
    <ul class="drawer-menu">
        <li><span class="icon">👤</span> Профиль</li>
        <li><span class="icon">👥</span> Контакты</li>
        <li><span class="icon">⚙️</span> Настройки</li>
        <li id="theme-toggle">
            <span class="icon" id="theme-icon">🌙</span> 
            <span id="theme-text">Ночной режим</span>
        </li>
        <li><span class="icon">❓</span> Помощь</li>
    </ul>
</div>

<div class="sidebar">
    <div class="sidebar-header">
        <button class="menu-btn" aria-label="Меню">☰</button>
        <input type="text" class="search-bar" placeholder="Поиск...">
    </div>
    <div class="chat-mock" id="chat-item-global">
        <div class="avatar">Г</div>
        <div class="chat-info">
            <div style="font-weight: 600; font-size: 15px;">Глобальный чат</div>
            <div style="font-size: 13px; opacity: 0.9;">Socket.IO работает!</div>
        </div>
    </div>
</div>

<div class="chat-area">
    <div class="chat-header">
        <button class="back-btn" id="back-btn" aria-label="Назад">←</button>
        <div class="chat-header-info">
            <span class="chat-name">Глобальный чат</span>
            <span class="chat-status">онлайн</span>
        </div>
    </div>

    <div class="messages" id="messages-list"></div>

    <div class="input-area-wrapper">
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Написать сообщение..." autocomplete="off">
            <button id="send-btn" aria-label="Отправить">↑</button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
    // --- ЛОГИКА ИНТЕРФЕЙСА (МЕНЮ И ТЕМА) ---
    const menuBtn = document.querySelector('.menu-btn');
    const drawer = document.getElementById('drawer');
    const backdrop = document.getElementById('backdrop');
    
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const themeText = document.getElementById('theme-text');

    menuBtn.addEventListener('click', () => {
        drawer.classList.add('open');
        backdrop.classList.add('show');
    });

    backdrop.addEventListener('click', () => {
        drawer.classList.remove('open');
        backdrop.classList.remove('show');
    });

    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-theme');
        themeIcon.textContent = '☀️';
        themeText.textContent = 'Светлый режим';
    }

    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-theme');
        if (document.body.classList.contains('dark-theme')) {
            localStorage.setItem('theme', 'dark');
            themeIcon.textContent = '☀️';
            themeText.textContent = 'Светлый режим';
        } else {
            localStorage.setItem('theme', 'light');
            themeIcon.textContent = '🌙';
            themeText.textContent = 'Ночной режим';
        }
    });

    // --- ЛОГИКА НАВИГАЦИИ ДЛЯ МОБИЛЬНЫХ ЭКРАНОВ ---
    const chatItemGlobal = document.getElementById('chat-item-global');
    const backBtn = document.getElementById('back-btn');

    chatItemGlobal.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
            document.body.classList.add('mobile-chat-active');
        }
    });

    backBtn.addEventListener('click', () => {
        document.body.classList.remove('mobile-chat-active');
    });

    // --- КРИПТОГРАФИЯ (Web Crypto API) ---
    let myKeyPair = null;
    let myPublicKeyBase64 = null;
    let myUsername = null; 
    let currentSharedKey = null; // <--- Для общего секрета
    let currentChatUser = null;  // <--- Имя текущего собеседника

    // --- ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ: Из Base64 обратно в байты ---
    function base64ToArrayBuffer(base64) {
        const binaryString = window.atob(base64);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        return bytes.buffer;
    }

    // --- МАГИЯ E2EE: Создаем Общий Секрет (Shared Key) ---
    async function deriveSharedSecret(friendPublicKeyBase64) {
        try {
            // 1. Превращаем Base64 обратно в формат, понятный крипто-движку
            const rawKey = base64ToArrayBuffer(friendPublicKeyBase64);

            // 2. Импортируем публичный ключ друга
            const friendPublicKey = await window.crypto.subtle.importKey(
                "raw",
                rawKey,
                { name: "ECDH", namedCurve: "P-256" },
                true,
                []
            );

            // 3. Смешиваем НАШ ПРИВАТНЫЙ и ЕГО ПУБЛИЧНЫЙ ключи
            const sharedSecretKey = await window.crypto.subtle.deriveKey(
                {
                    name: "ECDH",
                    public: friendPublicKey
                },
                myKeyPair.privateKey, // Наш секрет из браузера
                {
                    name: "AES-GCM",
                    length: 256 // Максимальная защита
                },
                false, // Запрещаем экспортировать этот ключ из памяти
                ["encrypt", "decrypt"] // Разрешаем шифровать и расшифровывать
            );

            console.log("🔥 Общий секретный ключ (AES-GCM) успешно создан!");
            return sharedSecretKey;
        } catch (error) {
            console.error("❌ Ошибка при вычислении общего секрета:", error);
            return null;
        }
    }

    // 1. Функция: отправляет ключ на сервер
    async function registerUserOnServer(username, publicKeyBase64) {
        try {
            const response = await fetch('/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, publicKey: publicKeyBase64 })
            });

            const data = await response.json();
            
            if (data.success) {
                console.log("✅ Успешно! Ключ сохранен в базу данных:", data.user);
                document.querySelector('.drawer-user-info .name').textContent = username;
                document.querySelector('.drawer-avatar').textContent = username.charAt(0).toUpperCase();
            }
        } catch (error) {
            console.error("❌ Ошибка при отправке ключа:", error);
        }
    }

    // Функция для загрузки списка пользователей с сервера
    async function loadUsers() {
        try {
            const response = await fetch('/api/users');
            const users = await response.json();
            
            const sidebar = document.querySelector('.sidebar');
            
            // Очищаем старый список контактов (чтобы не было дубликатов при автообновлении)
            document.querySelectorAll('.chat-mock').forEach(el => {
                if (el.id !== 'chat-item-global') el.remove();
            });
            
            users.forEach(user => {
                if (user.username === myUsername) return; 

                const chatItem = document.createElement('div');
                chatItem.className = 'chat-mock';
                const initial = user.username.charAt(0).toUpperCase();
                
                chatItem.innerHTML = `
                    <div class="avatar">${initial}</div>
                    <div class="chat-info">
                        <div style="font-weight: 600; font-size: 15px;">${user.username}</div>
                        <div style="font-size: 13px; opacity: 0.9;">Нажмите для E2EE чата</div>
                    </div>
                `;
                
                chatItem.addEventListener('click', async () => {
                    document.querySelector('.chat-name').textContent = user.username;
                    currentChatUser = user.username;
                    
                    console.log(`🔑 Вычисляем общий секрет с ${user.username}...`);
                    currentSharedKey = await deriveSharedSecret(user.publicKey);
                    
                    if (currentSharedKey) {
                        document.getElementById('messages-list').innerHTML = ''; 
                        // --- НОВОЕ: ЗАГРУЗКА ИСТОРИИ ---
                        console.log("📥 Загружаем зашифрованную историю с сервера...");
                        const histRes = await fetch(`/api/history/${myUsername}/${user.username}`);
                        const history = await histRes.json();
                        
                        // Расшифровываем каждое сообщение
                        for (let msg of history) {
                            const decryptedText = await decryptMessage(msg.secretBox, currentSharedKey);
                            if (decryptedText) {
                                const type = msg.sender === myUsername ? 'my-message' : 'other-message';
                                displayMessage(decryptedText, type, new Date(msg.createdAt));
                            } else {
                                displayMessage("🔒 Сообщение не расшифровано", "other-message", new Date(msg.createdAt));
                            }
                        }
                        // -------------------------------
                        console.log("✅ Теперь мы можем безопасно переписываться!");
                    }
                });

                sidebar.appendChild(chatItem);
            });
        } catch (error) {
            console.error("❌ Ошибка загрузки пользователей:", error);
        }
    }

    // 2. Функция для создания пары ключей (ТЕПЕРЬ С ПАМЯТЬЮ!)
    async function generateKeys() {
        console.log("Проверяем криптографические ключи...");
        
        // Пытаемся найти ключи в памяти браузера
        const storedPriv = localStorage.getItem('myPrivKey');
        const storedPub = localStorage.getItem('myPubKey');
        const storedName = localStorage.getItem('myUsername');

        if (storedPriv && storedPub && storedName) {
            console.log("🔑 Нашли сохраненные ключи в памяти браузера! Восстанавливаем личность...");
            myUsername = storedName;
            
            // Импортируем ключи обратно в крипто-движок
            myKeyPair = {
                privateKey: await window.crypto.subtle.importKey(
                    "jwk", JSON.parse(storedPriv), 
                    { name: "ECDH", namedCurve: "P-256" }, 
                    true, ["deriveKey", "deriveBits"]
                ),
                publicKey: await window.crypto.subtle.importKey(
                    "jwk", JSON.parse(storedPub), 
                    { name: "ECDH", namedCurve: "P-256" }, 
                    true, []
                )
            };
            
            const exportedPubKey = await window.crypto.subtle.exportKey("raw", myKeyPair.publicKey);
            myPublicKeyBase64 = btoa(String.fromCharCode.apply(null, new Uint8Array(exportedPubKey)));
            
        } else {
            console.log("Генерируем НОВЫЕ криптографические ключи...");
            myKeyPair = await window.crypto.subtle.generateKey(
                { name: "ECDH", namedCurve: "P-256" },
                true, 
                ["deriveKey", "deriveBits"]
            );

            // Сохраняем в localStorage (в формате JWK), чтобы пережить F5!
            const jwkPriv = await window.crypto.subtle.exportKey("jwk", myKeyPair.privateKey);
            const jwkPub = await window.crypto.subtle.exportKey("jwk", myKeyPair.publicKey);
            localStorage.setItem('myPrivKey', JSON.stringify(jwkPriv));
            localStorage.setItem('myPubKey', JSON.stringify(jwkPub));

            const exportedPubKey = await window.crypto.subtle.exportKey("raw", myKeyPair.publicKey);
            myPublicKeyBase64 = btoa(String.fromCharCode.apply(null, new Uint8Array(exportedPubKey)));
            
            myUsername = localStorage.getItem('myUsername');
        }

        console.log("Мой публичный ключ готов:", myPublicKeyBase64);
        
        // Обязательно "знакомим" сокет с нашим именем при старте
        socket.emit('register_user', myUsername);
        await registerUserOnServer(myUsername, myPublicKeyBase64);
        
        await loadUsers();
        
        // Магия: Автоматически обновляем контакты каждые 5 секунд!
        setInterval(loadUsers, 5000); 
    }

    // Запускаем процесс при открытии страницы
    // --- АВТОРИЗАЦИЯ И СТАРТ ---
    const authModal = document.getElementById('auth-modal');
    const authInput = document.getElementById('auth-username-input');
    const authBtn = document.getElementById('auth-submit-btn');

    const savedName = localStorage.getItem('myUsername');
    const savedPrivKey = localStorage.getItem('myPrivKey');

    // МАГИЯ АВТОВХОДА: Если ключи и ник уже есть - пускаем без окна!
    if (savedName && savedPrivKey) {
        authModal.style.display = "none";
        generateKeys(); // Сразу запускаем движок
    } else if (savedName) {
        authInput.value = savedName; 
    }

    authBtn.addEventListener('click', async () => {
        const enteredName = authInput.value.trim();
        if (!enteredName) return alert("Введите никнейм!");
        
        if (savedName && savedName !== enteredName) {
            localStorage.removeItem('myPrivKey');
            localStorage.removeItem('myPubKey');
        }

        authBtn.textContent = "Создаем ключи...";
        authBtn.style.opacity = "0.7";
        
        localStorage.setItem('myUsername', enteredName);
        
        await generateKeys(); 
        
        authModal.style.opacity = "0";
        setTimeout(() => authModal.style.display = "none", 500);
    });

    authInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') authBtn.click();
    });
    
    // В функции generateKeys() удалите строку с prompt(), она больше не нужна!

    // --- ЛОГИКА СОКЕТОВ И ШИФРОВАНИЯ ---
    const socket = io();
    
    // Как только сокет подключился, сообщаем серверу свой никнейм
    socket.on('connect', () => {
        if (myUsername) {
            socket.emit('register_user', myUsername);
        }
    });

    
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const messagesList = document.getElementById('messages-list');

    // --- 1. ФУНКЦИИ ШИФРОВАНИЯ (AES-GCM) ---
    async function encryptMessage(text, key) {
        const encoded = new TextEncoder().encode(text);
        const iv = window.crypto.getRandomValues(new Uint8Array(12)); // Вектор инициализации
        const ciphertext = await window.crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv },
            key,
            encoded
        );
        return {
            iv: window.btoa(String.fromCharCode.apply(null, new Uint8Array(iv))),
            ciphertext: window.btoa(String.fromCharCode.apply(null, new Uint8Array(ciphertext)))
        };
    }

    async function decryptMessage(encryptedData, key) {
        try {
            const iv = base64ToArrayBuffer(encryptedData.iv);
            const ciphertext = base64ToArrayBuffer(encryptedData.ciphertext);
            const decrypted = await window.crypto.subtle.decrypt(
                { name: "AES-GCM", iv: iv },
                key,
                ciphertext
            );
            return new TextDecoder().decode(decrypted);
        } catch (e) {
            return null; // Если расшифровать не вышло (ключи не совпали)
        }
    }

    // --- 2. ОТРИСОВКА СООБЩЕНИЙ ---
    function displayMessage(text, className, dateObj = new Date()) {
        const msgDiv = document.createElement('div');
        const timeString = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        msgDiv.className = `message ${className}`;
        msgDiv.innerHTML = `${text} <span class="meta">${timeString}</span>`;
        messagesList.appendChild(msgDiv);
        messagesList.scrollTop = messagesList.scrollHeight;
    }

    // --- 3. ОТПРАВКА СООБЩЕНИЯ ---
    async function sendMessage() {
        const text = messageInput.value.trim();
        
        if (!currentSharedKey || !currentChatUser) {
            alert("Сначала выберите собеседника слева!");
            return;
        }

        if (text) {
            // ШИФРУЕМ текст нашим общим с собеседником секретом
            const encryptedData = await encryptMessage(text, currentSharedKey);

            // Упаковываем в "конверт"
            const payload = {
                sender: myUsername,
                recipient: currentChatUser,
                secretBox: encryptedData
            };

            // Отправляем серверу. Сервер увидит только непонятную строку JSON с шифром.
            socket.emit('send_message', { text: JSON.stringify(payload) });

            // Рисуем сообщение у себя (себе же расшифровывать не нужно)
            displayMessage(text, 'my-message');
            messageInput.value = '';
            
            if (window.innerWidth > 768) {
                messageInput.focus(); 
            }
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // --- 4. ПОЛУЧЕНИЕ СООБЩЕНИЯ ---
    socket.on('receive_message', async (data) => {
        try {
            const payload = JSON.parse(data.text);

            // Если письмо пришло от того, с кем мы сейчас НЕ в чате
            if (payload.sender !== currentChatUser) {
                console.log(`Вам скрытое сообщение от ${payload.sender}. Переключитесь на чат с ним.`);
                return;
            }

            // РАСШИФРОВЫВАЕМ (AES-GCM сам проверит подлинность)
            const decryptedText = await decryptMessage(payload.secretBox, currentSharedKey);
            
            if (decryptedText) {
                displayMessage(decryptedText, 'other-message');
            } else {
                console.error("Взлом или несовпадение ключей! Сообщение уничтожено.");
            }
        } catch (e) {
            console.error("Ошибка обработки пакета", e);
        }
    });
</script>

</body>
</html>
