<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>паркетич</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="auth-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s;">
    <div style="background: var(--bg-sidebar); padding: 40px; border-radius: 20px; box-shadow: var(--shadow-md); width: 90%; max-width: 350px; text-align: center;">
        <h2 style="margin-top: 0; color: var(--text-main);">паркетич</h2>
        <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 25px;">Ключи шифрования хранятся только на вашем устройстве</p>
        <input type="text" id="auth-username-input" placeholder="Ваш никнейм" autocomplete="off" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 16px; background: var(--input-bg); color: var(--text-main); outline: none;">
        <input type="password" id="auth-password-input" placeholder="Пароль (для шифрования ключей)" autocomplete="off" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 16px; background: var(--input-bg); color: var(--text-main); outline: none;">
        <button id="auth-submit-btn" style="width: 100%; padding: 14px; background: var(--gradient-primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.2s;">Войти / Создать</button>
    </div>
</div>
<div id="video-record-overlay">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 30px;">
            
            <div class="record-circle-container">
                <video id="record-preview" autoplay muted playsinline></video>
                <div id="record-timer">
                    <div class="dot"></div>
                    <span id="record-time-text">0:00</span>
                </div>
            </div>
            
            <div class="record-controls">
                <button id="record-switch-cam-btn" title="Сменить камеру" class="control-btn switch">🔄</button>
                <button id="record-pause-btn" title="Пауза" class="control-btn pause">||</button>
                <button id="record-stop-btn" title="Остановить" class="control-btn stop">■</button>
            </div>

        </div>
    </div>
<div id="contacts-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
    <div style="background: var(--bg-sidebar); width: 90%; max-width: 400px; border-radius: 20px; padding: 20px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: var(--shadow-md);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0; color: var(--text-main);">Контакты</h3>
            <button id="close-contacts-btn" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted);">&times;</button>
        </div>
        <div id="contacts-list" style="overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px;">
            </div>
    </div>
</div>

<div class="backdrop" id="backdrop"></div>

<div class="drawer" id="drawer">
    <div class="drawer-header">
        <div class="drawer-avatar">П</div>
        <div class="drawer-user-info">
            <div class="name">Мой Профиль</div>
            <div class="phone">+1 234 567 89 00</div>
        </div>
    </div>
    <ul class="drawer-menu">
        <li><span class="icon">👤</span> Профиль</li>
        <li id="contacts-btn"><span class="icon">👥</span> Контакты</li>
        <li><span class="icon">⚙️</span> Настройки</li>
        <li id="theme-toggle">
            <span class="icon" id="theme-icon">🌙</span> 
            <span id="theme-text">Ночной режим</span>
        </li>
        <li id="logout-btn" style="color: #ff4d4d;"><span class="icon">🚪</span> Выйти</li>
    </ul>
</div>

<div class="sidebar">
    <div class="sidebar-header">
        <button class="menu-btn" aria-label="Меню">☰</button>
        <input type="text" class="search-bar" placeholder="Поиск...">
    </div>
</div>

<div class="chat-area">
    <div class="chat-header">
        <button class="back-btn" id="back-btn" aria-label="Назад">←</button>
        <div class="chat-header-info">
            <span class="chat-name">Глобальный чат</span>
            <span class="chat-status">онлайн</span>
        </div>
    </div>

    <div class="messages" id="messages-list"></div>

    <div class="input-area-wrapper">
        <div class="input-area">
            <input type="file" id="image-upload" accept="image/*" style="display: none;">
            <input type="file" id="file-upload" style="display: none;">
            
            <label for="image-upload" style="cursor: pointer; font-size: 22px; margin-right: 10px; color: var(--text-muted); transition: 0.2s;" title="Отправить картинку" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='var(--text-muted)'">📷</label>
            <label for="file-upload" style="cursor: pointer; font-size: 22px; margin-right: 10px; color: var(--text-muted); transition: 0.2s;" title="Отправить файл" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='var(--text-muted)'">📎</label>

            <button id="mic-btn" style="background: none; border: none; font-size: 22px; margin-right: 10px; cursor: pointer; color: var(--text-muted); transition: 0.2s;" title="Голосовое сообщение">🎤</button>
            
            <input type="text" id="message-input" placeholder="Написать сообщение..." autocomplete="off">
            <button id="send-btn" aria-label="Отправить">↑</button>
        </div>
    </div>
</div>

<div id="image-viewer">
        <div class="viewer-img-container">
            <img src="" alt="Full screen preview">
        </div>
    </div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
    // --- ЛОГИКА ИНТЕРФЕЙСА (МЕНЮ И ТЕМА) ---
    const menuBtn = document.querySelector('.menu-btn');
    const drawer = document.getElementById('drawer');
    const backdrop = document.getElementById('backdrop');
    
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const themeText = document.getElementById('theme-text');

    // --- ПЕРЕМЕННЫЕ ДЛЯ ЗАПИСИ "КРУЖОЧКОВ" (ВИДЕО) ---
    const imageInputLabel = document.querySelector('label[for="image-upload"]');
    const imageInput = document.getElementById('image-upload');
    const videoRecordOverlay = document.getElementById('video-record-overlay');
    const recordPreview = document.getElementById('record-preview');
    const recordTimeText = document.getElementById('record-time-text');
    const recordPauseBtn = document.getElementById('record-pause-btn');
    const recordStopBtn = document.getElementById('record-stop-btn');

    let pressTimer = null; // Таймер для распознавания зажатия
    let isHolding = false; // Флаг, что кнопка зажата
    let isRecordingCircle = false; // Флаг, что идет запись
    let circleMediaRecorder;
    let circleVideoChunks = [];
    let circleRecordTimerInterval;
    let circleStartTime;
    const recordSwitchCamBtn = document.getElementById('record-switch-cam-btn');
    let currentFacingMode = 'user'; // 'user' - фронтальная, 'environment' - задняя

    menuBtn.addEventListener('click', () => {
        drawer.classList.add('open');
        backdrop.classList.add('show');
    });

    backdrop.addEventListener('click', () => {
        drawer.classList.remove('open');
        backdrop.classList.remove('show');
    });

    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-theme');
        themeIcon.textContent = '☀️';
        themeText.textContent = 'Светлый режим';
    }

    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-theme');
        if (document.body.classList.contains('dark-theme')) {
            localStorage.setItem('theme', 'dark');
            themeIcon.textContent = '☀️';
            themeText.textContent = 'Светлый режим';
        } else {
            localStorage.setItem('theme', 'light');
            themeIcon.textContent = '🌙';
            themeText.textContent = 'Ночной режим';
        }
    });

    // --- ЛОГИКА ВЫХОДА ИЗ АККАУНТА ---
    const logoutBtn = document.getElementById('logout-btn');
    
    logoutBtn.addEventListener('click', () => {
        // Спрашиваем подтверждение перед выходом
        const isConfirmed = confirm("Вы уверены, что хотите выйти? Локальные ключи будут удалены с устройства.");
        
        if (isConfirmed) {
            // Очищаем всё!
            localStorage.clear();
            
            // Перезагружаем страницу. 
            // Так как памяти больше нет, браузер сам покажет окно авторизации!
            location.reload(); 
        }
    });

    // --- ЛОГИКА НАВИГАЦИИ ДЛЯ МОБИЛЬНЫХ ЭКРАНОВ ---
    const backBtn = document.getElementById('back-btn');

    backBtn.addEventListener('click', () => {
        document.body.classList.remove('mobile-chat-active');
    });

    // --- КРИПТОГРАФИЯ (Web Crypto API) ---
    let myKeyPair = null;
    let myPublicKeyBase64 = null;
    let myUsername = null; 
    let currentSharedKey = null; // <--- Для общего секрета
    let currentChatUser = null;  // <--- Имя текущего собеседника

    // --- ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ: Из Base64 обратно в байты ---
    function base64ToArrayBuffer(base64) {
        const binaryString = window.atob(base64);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        return bytes.buffer;
    }

    // --- МАГИЯ E2EE: Создаем Общий Секрет (Shared Key) ---
    async function deriveSharedSecret(friendPublicKeyBase64) {
        try {
            // 1. Превращаем Base64 обратно в формат, понятный крипто-движку
            const rawKey = base64ToArrayBuffer(friendPublicKeyBase64);

            // 2. Импортируем публичный ключ друга
            const friendPublicKey = await window.crypto.subtle.importKey(
                "raw",
                rawKey,
                { name: "ECDH", namedCurve: "P-256" },
                true,
                []
            );

            // 3. Смешиваем НАШ ПРИВАТНЫЙ и ЕГО ПУБЛИЧНЫЙ ключи
            const sharedSecretKey = await window.crypto.subtle.deriveKey(
                {
                    name: "ECDH",
                    public: friendPublicKey
                },
                myKeyPair.privateKey, // Наш секрет из браузера
                {
                    name: "AES-GCM",
                    length: 256 // Максимальная защита
                },
                false, // Запрещаем экспортировать этот ключ из памяти
                ["encrypt", "decrypt"] // Разрешаем шифровать и расшифровывать
            );

            console.log("🔥 Общий секретный ключ (AES-GCM) успешно создан!");
            return sharedSecretKey;
        } catch (error) {
            console.error("❌ Ошибка при вычислении общего секрета:", error);
            return null;
        }
    }

    // 1. Функция: отправляет ключ на сервер
    async function registerUserOnServer(username, publicKeyBase64, encryptedPrivKeyBase64) {
        try {
            const response = await fetch('/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // ТЕПЕРЬ МЫ ОТПРАВЛЯЕМ СЕЙФ НА СЕРВЕР:
                body: JSON.stringify({ username: username, publicKey: publicKeyBase64, encryptedPrivKey: encryptedPrivKeyBase64 })
            });

            const data = await response.json();
            
            if (data.success) {
                console.log("✅ Успешно! Ключ сохранен в базу данных:", data.user);
                document.querySelector('.drawer-user-info .name').textContent = username;
                document.querySelector('.drawer-avatar').textContent = username.charAt(0).toUpperCase();
            }
        } catch (error) {
            console.error("❌ Ошибка при отправке ключа:", error);
        }
    }

    // --- 1. ФУНКЦИЯ: ОТКРЫТЬ ЧАТ С ПОЛЬЗОВАТЕЛЕМ ---
    // --- 1. ФУНКЦИЯ: ОТКРЫТЬ ЧАТ С ПОЛЬЗОВАТЕЛЕМ ---
    async function openChatWith(user) {
        document.getElementById('contacts-modal').style.display = 'none';
        document.getElementById('drawer').classList.remove('open');
        document.getElementById('backdrop').classList.remove('show');
        if (window.innerWidth <= 768) document.body.classList.add('mobile-chat-active');

        document.querySelector('.chat-name').textContent = user.username;
        currentChatUser = user.username;
        loadActiveChats(); 
        
        currentSharedKey = await deriveSharedSecret(user.publicKey);
        
        if (currentSharedKey) {
            document.getElementById('messages-list').innerHTML = ''; 
            const histRes = await fetch(`/api/history/${myUsername}/${user.username}`);
            const history = await histRes.json();
            
            for (let msg of history) {
                try {
                    const box = msg.secretBox;
                    const decryptedBuffer = await decryptMessage(box, currentSharedKey);
                    
                    if (decryptedBuffer) {
                        const type = msg.sender === myUsername ? 'my-message' : 'other-message';
                        
                        // Если это старое сообщение (без box.type) или текст:
                        // Если это старое сообщение (без box.type) или текст:
                        if (!box.type || box.type === 'TEXT') {
                            const text = bufferToText(decryptedBuffer);
                            displayMessage(text, type, new Date(msg.createdAt), false, '', msg.isRead);
                        } else if (box.type === 'AUDIO') {
                            // АУДИО
                            const blob = new Blob([decryptedBuffer], { type: box.mimeType });
                            const url = URL.createObjectURL(blob);
                            displayMessage(url, type, new Date(msg.createdAt), false, '', msg.isRead, true, false); 
                        } else if (box.type === 'VIDEO_CIRCLE') {
                            // КРУЖОЧКИ
                            const blob = new Blob([decryptedBuffer], { type: box.mimeType });
                            const url = URL.createObjectURL(blob);
                            displayMessage(url, type, new Date(msg.createdAt), false, '', msg.isRead, false, true); 
                        } else {
                            // КАРТИНКИ И ФАЙЛЫ
                            const blob = new Blob([decryptedBuffer], { type: box.mimeType });
                            const fileUrl = URL.createObjectURL(blob);
                            displayMessage(fileUrl, type, new Date(msg.createdAt), box.type === 'IMAGE', box.fileName, msg.isRead);
                        }
                    }
                } catch(e) { console.error("Ошибка истории", e); }
            }
            // СКАЗАТЬ СЕРВЕРУ, ЧТО МЫ ВСЁ ПРОЧИТАЛИ:
            socket.emit('mark_read', { sender: user.username, recipient: myUsername });
        }
    }

    // --- 2. ФУНКЦИЯ: ЗАГРУЗКА ТОЛЬКО АКТИВНЫХ ЧАТОВ ---
    async function loadActiveChats() {
        if (!myUsername) return; 

        try {
            const usersRes = await fetch('/api/users');
            const allUsers = await usersRes.json();
            
            // Спрашиваем у сервера, с кем у нас есть переписка
            const activeRes = await fetch(`/api/users/${myUsername}/chats`);
            const activeNames = await activeRes.json();
            
            const sidebar = document.querySelector('.sidebar');
            document.querySelectorAll('.sidebar .chat-mock').forEach(el => el.remove()); // Очищаем список
            
            // МАГИЯ ИСЧЕЗНОВЕНИЯ: показываем только тех, кто есть в истории БД, 
            // ИЛИ того, с кем мы открыли чат прямо сейчас
            const usersToShow = allUsers.filter(user => 
                user.username !== myUsername && 
                (activeNames.includes(user.username) || user.username === currentChatUser)
            );
            
            usersToShow.forEach(user => {
                const chatItem = document.createElement('div');
                chatItem.className = 'chat-mock';
                
                // Делаем неактивные чаты визуально темнее/светлее
                if (user.username !== currentChatUser) {
                    chatItem.style.background = 'var(--input-bg)';
                    chatItem.style.color = 'var(--text-main)';
                }
                
                chatItem.innerHTML = `
                    <div class="avatar" style="${user.username !== currentChatUser ? 'background: var(--gradient-primary); color: white;' : ''}">${user.username.charAt(0).toUpperCase()}</div>
                    <div class="chat-info">
                        <div style="font-weight: 600; font-size: 15px;">${user.username}</div>
                        <div style="font-size: 13px; opacity: 0.9;">Нажмите для чата</div>
                    </div>
                `;
                
                chatItem.addEventListener('click', () => openChatWith(user));
                sidebar.appendChild(chatItem);
            });
        } catch (error) {
            console.error("❌ Ошибка загрузки чатов:", error);
        }
    }

    // --- 3. ЛОГИКА ОКНА КОНТАКТОВ ---
    document.getElementById('contacts-btn').addEventListener('click', async () => {
        document.getElementById('drawer').classList.remove('open');
        document.getElementById('backdrop').classList.remove('show');
        document.getElementById('contacts-modal').style.display = 'flex';
        
        try {
            const res = await fetch('/api/users');
            const users = await res.json();
            const list = document.getElementById('contacts-list');
            list.innerHTML = '';
            
            users.forEach(user => {
                if (user.username === myUsername) return; 
                
                const item = document.createElement('div');
                item.style.cssText = "display: flex; align-items: center; gap: 15px; padding: 12px; cursor: pointer; border-radius: 12px; background: var(--input-bg); transition: 0.2s;";
                item.innerHTML = `
                    <div style="width: 44px; height: 44px; border-radius: 50%; background: var(--gradient-primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px;">${user.username.charAt(0).toUpperCase()}</div>
                    <div style="font-weight: 600; color: var(--text-main); font-size: 16px;">${user.username}</div>
                `;
                item.addEventListener('click', () => openChatWith(user));
                list.appendChild(item);
            });
        } catch (e) {
            console.error("Ошибка загрузки контактов:", e);
        }
    });

    document.getElementById('close-contacts-btn').addEventListener('click', () => {
        document.getElementById('contacts-modal').style.display = 'none';
    });

    // 2. Функция для создания пары ключей (ТЕПЕРЬ С ПАМЯТЬЮ!)
    async function generateKeys() {
        console.log("Проверяем криптографические ключи...");
        
        // Пытаемся найти ключи в памяти браузера
        const storedPriv = localStorage.getItem('myPrivKey');
        const storedPub = localStorage.getItem('myPubKey');
        const storedName = localStorage.getItem('myUsername');

        if (storedPriv && storedPub && storedName) {
            console.log("🔑 Нашли сохраненные ключи в памяти браузера! Восстанавливаем личность...");
            myUsername = storedName;
            
            // Импортируем ключи обратно в крипто-движок
            myKeyPair = {
                privateKey: await window.crypto.subtle.importKey(
                    "jwk", JSON.parse(storedPriv), 
                    { name: "ECDH", namedCurve: "P-256" }, 
                    true, ["deriveKey", "deriveBits"]
                ),
                publicKey: await window.crypto.subtle.importKey(
                    "jwk", JSON.parse(storedPub), 
                    { name: "ECDH", namedCurve: "P-256" }, 
                    true, []
                )
            };
            
            const exportedPubKey = await window.crypto.subtle.exportKey("raw", myKeyPair.publicKey);
            myPublicKeyBase64 = btoa(String.fromCharCode.apply(null, new Uint8Array(exportedPubKey)));
            
        } else {
            console.log("Генерируем НОВЫЕ криптографические ключи...");
            myKeyPair = await window.crypto.subtle.generateKey(
                { name: "ECDH", namedCurve: "P-256" },
                true, 
                ["deriveKey", "deriveBits"]
            );

            // Сохраняем в localStorage (в формате JWK), чтобы пережить F5!
            const jwkPriv = await window.crypto.subtle.exportKey("jwk", myKeyPair.privateKey);
            const jwkPub = await window.crypto.subtle.exportKey("jwk", myKeyPair.publicKey);
            localStorage.setItem('myPrivKey', JSON.stringify(jwkPriv));
            localStorage.setItem('myPubKey', JSON.stringify(jwkPub));

            const exportedPubKey = await window.crypto.subtle.exportKey("raw", myKeyPair.publicKey);
            myPublicKeyBase64 = btoa(String.fromCharCode.apply(null, new Uint8Array(exportedPubKey)));
            
            myUsername = localStorage.getItem('myUsername');
        }

        console.log("Мой публичный ключ готов:", myPublicKeyBase64);
        
        // Обязательно "знакомим" сокет с нашим именем при старте
        socket.emit('register_user', myUsername);
        await registerUserOnServer(myUsername, myPublicKeyBase64);
        
        await loadActiveChats();
        
        // Магия: Автоматически обновляем контакты каждые 5 секунд!
        setInterval(loadActiveChats, 5000); 
    }

    // Запускаем процесс при открытии страницы
    // --- МАГИЯ PBKDF2: Превращаем пароль в сверхнадежный ключ ---
    async function deriveKeyFromPassword(password, saltString) {
        const enc = new TextEncoder();
        const keyMaterial = await window.crypto.subtle.importKey(
            "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]
        );
        return window.crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: enc.encode(saltString), iterations: 100000, hash: "SHA-256" },
            keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
        );
    }

    // --- НОВАЯ СИСТЕМА ЛОГИНА И РЕГИСТРАЦИИ ---
    async function loginOrRegister(username, password) {
        console.log("🔐 Проверяем пользователя на сервере...");
        
        // 1. Создаем ключ-отмычку из пароля
        const kek = await deriveKeyFromPassword(password, username);
        
        // 2. Ищем пользователя в БД
        const res = await fetch(`/api/users/${username}`);
        const userOnServer = await res.json();

        if (userOnServer && userOnServer.encryptedPrivKey) {
            console.log("📥 Пользователь найден! Взламываем сейф вашим паролем...");
            try {
                // Пытаемся расшифровать сейф
                const encData = JSON.parse(userOnServer.encryptedPrivKey);
                
                // ИСПРАВЛЕНИЕ: Теперь функция возвращает байты, переводим их обратно в текст!
                const decryptedBuffer = await decryptMessage(encData, kek);
                if (!decryptedBuffer) throw new Error("bad_password");
                const privKeyJsonString = bufferToText(decryptedBuffer);

                // Если пароль подошел - импортируем ключи в браузер!
                myKeyPair = {
                    privateKey: await window.crypto.subtle.importKey("jwk", JSON.parse(privKeyJsonString), { name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey", "deriveBits"]),
                    publicKey: await window.crypto.subtle.importKey("raw", base64ToArrayBuffer(userOnServer.publicKey), { name: "ECDH", namedCurve: "P-256" }, true, [])
                };
                myPublicKeyBase64 = userOnServer.publicKey;
                console.log("✅ Успешный вход! Ключи восстановлены из сервера.");
                
            } catch (e) {
                alert("❌ Неверный пароль!");
                return false;
            }
        } else {
            console.log("🆕 Новый пользователь! Генерируем ключи...");
            myKeyPair = await window.crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey", "deriveBits"]);
            
            const exportedPubKey = await window.crypto.subtle.exportKey("raw", myKeyPair.publicKey);
            myPublicKeyBase64 = btoa(String.fromCharCode.apply(null, new Uint8Array(exportedPubKey)));

            // 3. Прячем приватный ключ в сейф (шифруем паролем)
            const jwkPriv = await window.crypto.subtle.exportKey("jwk", myKeyPair.privateKey);

    // --- 1. ФУНКЦИИ ШИФРОВАНИЯ (AES-GCM - BINARY MODE) ---
    
    // Помощник: Текст -> Байты (ArrayBuffer)
    function textToBuffer(text) {
        return new TextEncoder().encode(text);
    }
    
    // Помощник: Байты -> Текст
    function bufferToText(buffer) {
        return new TextDecoder().decode(buffer);
    }

    // --- Помощник: Безопасная конвертация больших файлов в Base64 ---
    // Разбивает массив на кусочки по 8 КБ, чтобы браузер не сошел с ума от переполнения памяти
    function bufferToBase64(buffer) {
        let binary = '';
        const bytes = new Uint8Array(buffer);
        const chunkSize = 8192; 
        for (let i = 0; i < bytes.length; i += chunkSize) {
            binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
        }
        return window.btoa(binary);
    }

    async function encryptMessage(dataBuffer, key) {
        const iv = new Uint8Array(12);
        window.crypto.getRandomValues(iv); // Вызываем синхронно, без await

        const ciphertext = await window.crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv },
            key,
            dataBuffer
        );
        
        return {
            // ИСПОЛЬЗУЕМ НАШ НОВЫЙ БЕЗОПАСНЫЙ ПОМОЩНИК
            iv: bufferToBase64(iv),
            ciphertext: bufferToBase64(ciphertext) 
        };
    }
    async function decryptMessage(encryptedData, key) {
        try {
            const iv = base64ToArrayBuffer(encryptedData.iv);
            const ciphertext = base64ToArrayBuffer(encryptedData.ciphertext);
            const decryptedBuffer = await window.crypto.subtle.decrypt(
                { name: "AES-GCM", iv: iv },
                key,
                ciphertext
            );
            // Возвращаем чистые байты (ArrayBuffer)
            return decryptedBuffer;
        } catch (e) {
            return null; 
        }
    }

    // --- ПЕРЕМЕННЫЕ И ЛОГИКА ПРОСМОТРА ФОТО (TELEGRAM STYLE) ---
    const imageViewer = document.getElementById('image-viewer');

    const imageViewerImg = viewerContainer.querySelector('img');

    let currentScale = 1;
    const scaleFactor = 1.15;
    const minScale = 0.5;
    const maxScale = 5;

    function applyScale() {
        viewerContainer.style.transform = `scale(${currentScale})`;
    }

        let newScale = currentScale * (direction > 0 ? scaleFactor : 1/scaleFactor);
        newScale = Math.max(minScale, Math.min(maxScale, newScale));
        currentScale = newScale;
        applyScale();
    }, { passive: false });

    // --- 2. ОТРИСОВКА СООБЩЕНИЙ (ВСЕ ФОРМАТЫ) ---
    function displayMessage(content, className, dateObj = new Date(), isImage = false, fileName = '', isRead = false, isAudio = false, isCircleVideo = false) {
        const msgDiv = document.createElement('div');
        const timeString = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        let innerContent = content;

        if (isCircleVideo) {
            // КРУЖОЧКИ (ВИДЕО)
            innerContent = `
                <video src="${content}" playsinline autoplay loop muted style="width: 180px; height: 180px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; display: block;"></video>
                <div style="font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 5px;">Кружочек</div>
            `;
            setTimeout(() => {
                const videoNode = msgDiv.querySelector('video');
                if (videoNode) {
                    videoNode.onclick = () => {
                        if (videoNode.paused) videoNode.play();
                        else videoNode.pause();
                    };
                }
            }, 0);
        } else if (isAudio) {
            // ГОЛОСОВЫЕ СООБЩЕНИЯ
            innerContent = `<audio controls style="max-width: 220px; height: 40px; border-radius: 8px; outline: none;"><source src="${content}"></audio>`;
        } else if (isImage) {
            // КАРТИНКИ
            innerContent = `<img src="${content}" alt="${fileName}" class="chat-image" style="max-width: 100%; border-radius: 8px; cursor: pointer; transition: 0.2s;" />`;
            setTimeout(() => {
                const imgNode = msgDiv.querySelector('.chat-image');
                if (imgNode) imgNode.onclick = () => viewImage(content);
            }, 0);
        } else if (fileName) {
            // ФАЙЛЫ
            innerContent = `
                <div style="display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 8px;">
                    <span style="font-size: 24px;">📄</span>
                    <a href="${content}" download="${fileName}" style="color: inherit; text-decoration: none; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px;">${fileName}</a>
                </div>
            `;
        } else {
            // ОБЫЧНЫЙ ТЕКСТ
            msgDiv.classList.add('text-message');
        }

        // ГАЛОЧКИ ДЛЯ СВОИХ СООБЩЕНИЙ

            statusHtml = `<span class="msg-status ${isRead ? 'status-read' : 'status-sent'}">${isRead ? '✓✓' : '✓'}</span>`;

        messagesList.appendChild(msgDiv);
        messagesList.scrollTop = messagesList.scrollHeight;
    }

    // --- 3. ОТПРАВКА ОБЫЧНОГО СООБЩЕНИЯ ---
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!currentSharedKey || !currentChatUser) return alert("Сначала выберите собеседника слева!");

        if (text) {
            const dataBuffer = textToBuffer(text);
            const encryptedData = await encryptMessage(dataBuffer, currentSharedKey);

            // ТРЮК: Прячем тип сообщения прямо в secretBox, чтобы не менять БД!
            const payload = {
                sender: myUsername,
                recipient: currentChatUser,
                secretBox: { ...encryptedData, type: 'TEXT' }
            };

            socket.emit('send_message', { text: JSON.stringify(payload) });
            displayMessage(text, 'my-message', new Date(), false, '', false);
            messageInput.value = '';
            if (window.innerWidth > 768) messageInput.focus(); 
        }
    }

    // --- 5. ОТПРАВКА КАРТИНОК И ФАЙЛОВ ---
    function readFileAsArrayBuffer(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
            reader.readAsArrayBuffer(file); 
        });
    }

    async function sendFile(file, isImage) {
        if (!currentSharedKey || !currentChatUser) return alert("Сначала выберите собеседника слева!");
        if (file.size > 10 * 1024 * 1024) return alert("Файл слишком большой! Максимальный размер 10 МБ.");

        try {
            console.log(`⏳ Подготовка файла ${file.name}...`);
            const dataBuffer = await readFileAsArrayBuffer(file);
            console.log(`🔒 Шифрование байтов файла...`);
            const encryptedData = await encryptMessage(dataBuffer, currentSharedKey);

            const payload = {
                sender: myUsername,
                recipient: currentChatUser,
                secretBox: { 
                    ...encryptedData, 
                    type: isImage ? 'IMAGE' : 'FILE',
                    fileName: file.name,
                    mimeType: file.type 
                }
            };

            socket.emit('send_message', { text: JSON.stringify(payload) });
            
            const fileUrl = URL.createObjectURL(file);
            displayMessage(fileUrl, 'my-message', new Date(), isImage, file.name, false);
        } catch (error) {
            console.error("Ошибка при отправке файла:", error);
            alert("Не удалось зашифровать файл.");
        }
    }

    // --- 7. ЗАПИСЬ И ОТПРАВКА "КРУЖОЧКОВ" (ВИДЕОСООБЩЕНИЙ) ---

    // Функция обновления таймера записи
    function updateCircleTimer() {
        const diff = Date.now() - circleStartTime;
        const totalSeconds = Math.floor(diff / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        recordTimeText.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }

    // Функция СТАРТА записи
    // Функция СТАРТА записи
    async function startRecordingCircle() {
        if (!currentSharedKey || !currentChatUser) {
            alert("Сначала выберите собеседника слева!");
            clearTimeout(pressTimer);
            return;
        }

        try {
            console.log("🎥 Запрашиваем доступ к камере и микрофону...");
            
            // Сбрасываем на фронталку при каждом новом кружке
            currentFacingMode = 'user'; 
            recordPreview.classList.add('mirrored');

            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 640 } },
                audio: true
            });
            
            recordPreview.srcObject = stream;
            videoRecordOverlay.classList.add('show');
            
            circleVideoChunks = [];
            circleMediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });

            circleMediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) circleVideoChunks.push(e.data);
            };

            // ОБНОВЛЕНО: Мы больше не отправляем по stop(), а делаем это по кнопке STOP
            circleMediaRecorder.onstop = () => {
                // Прячем оверлей
                videoRecordOverlay.classList.remove('show');
            };

            // Начинаем запись, сохраняя данные каждые 100мс (для паузы)
            circleMediaRecorder.start(100); 
            isRecordingCircle = true;
            
            // Запускаем таймер
            circleStartTime = Date.now();
            recordTimeText.textContent = "0:00";
            circleRecordTimerInterval = setInterval(updateCircleTimer, 1000);

            // Сбрасываем состояние кнопок
            recordPauseBtn.classList.remove('paused');
            recordPauseBtn.textContent = '||';

        } catch (err) {
            console.error("Ошибка камеры:", err);
            alert("Разрешите доступ к камере и микрофону!");
            isHolding = false;
        }
    }
    // Функция ОСТАНОВКИ записи
    function stopRecordingCircle() {
        if (!isRecordingCircle) return;
        
        clearInterval(circleRecordTimerInterval);
        circleMediaRecorder.stop();
        // Отключаем камеру и микрофон, чтобы красная точка пропала
        circleMediaRecorder.stream.getTracks().forEach(track => track.stop());
        isRecordingCircle = false;
    }

    // Обработчик кнопки СМЕНЫ КАМЕРЫ
    recordSwitchCamBtn.addEventListener('click', async () => {
        if (!isRecordingCircle) return;

        try {
            // Запрашиваем ТОЛЬКО новое видео (без аудио, чтобы не прерывать запись звука)
            const newVideoStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: newFacingMode, width: { ideal: 640 }, height: { ideal: 640 } }
            });
            
            const newVideoTrack = newVideoStream.getVideoTracks()[0];
            const currentStream = recordPreview.srcObject;
            const oldVideoTrack = currentStream.getVideoTracks()[0];
            
            // Магия подмены трека "на лету"
            currentStream.removeTrack(oldVideoTrack);
            currentStream.addTrack(newVideoTrack);
            oldVideoTrack.stop(); // Выключаем старую камеру
            
            // Применяем новый режим и отзеркаливание
            currentFacingMode = newFacingMode;

            circleMediaRecorder.resume();
            recordPauseBtn.classList.remove('paused');
            recordPauseBtn.textContent = '||'; // Меняем обратно на паузу
            
            // Корректируем время старта, чтобы таймер шел правильно
            circleStartTime = Date.now() - (Date.now() - circleStartTime); // Упрощенная логика
            circleRecordTimerInterval = setInterval(updateCircleTimer, 1000); // Запускаем таймер
        }
    });

    // Обработчик кнопки СТОП И ОТПРАВИТЬ
    recordStopBtn.addEventListener('click', async () => {
        if (!isRecordingCircle) return;
        
        // Останавливаем запись
        clearInterval(circleRecordTimerInterval);
        circleMediaRecorder.stop();
        // Отключаем камеру и микрофон
        circleMediaRecorder.stream.getTracks().forEach(track => track.stop());
        isRecordingCircle = false;
        
        // Ждем немного, пока все данные соберутся
        await new Promise(resolve => setTimeout(resolve, 300));

        if (circleVideoChunks.length === 0) return;

        console.log(`🔒 Шифрование видео-кружка...`);
        const videoBlob = new Blob(circleVideoChunks, { type: 'video/webm' });
        const arrayBuffer = await videoBlob.arrayBuffer();
        const encryptedData = await encryptMessage(arrayBuffer, currentSharedKey);

        const payload = {
            sender: myUsername,
            recipient: currentChatUser,
            secretBox: { 
                ...encryptedData, 
                type: 'VIDEO_CIRCLE',
                mimeType: 'video/webm'
            }
        };

        socket.emit('send_message', { text: JSON.stringify(payload) });
        
        const videoUrl = URL.createObjectURL(videoBlob);
        displayMessage(videoUrl, 'my-message', new Date(), false, '', false, true);
        
        // Прячем оверлей
        videoRecordOverlay.classList.remove('show');
    });

    // Слушатели для наших новых кнопок
    document.getElementById('image-upload').addEventListener('change', (e) => {
        if (e.target.files[0]) sendFile(e.target.files[0], true);
        e.target.value = ''; // Сбрасываем выбор
    });

    document.getElementById('file-upload').addEventListener('change', (e) => {
        if (e.target.files[0]) sendFile(e.target.files[0], false);
        e.target.value = ''; // Сбрасываем выбор
    });
    
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // --- 4. ПОЛУЧЕНИЕ СООБЩЕНИЯ ---
    socket.on('receive_message', async (data) => {
        try {
            const payload = JSON.parse(data.text);
            if (payload.sender !== currentChatUser) return;

            const box = payload.secretBox;
            const decryptedBuffer = await decryptMessage(box, currentSharedKey);
            
            if (decryptedBuffer) {
                if (!box.type || box.type === 'TEXT') {
                    const text = bufferToText(decryptedBuffer);
                    displayMessage(text, 'other-message', new Date(), false);
                } else if (box.type === 'AUDIO') {
                    // АУДИО
                    const blob = new Blob([decryptedBuffer], { type: box.mimeType });
                    const url = URL.createObjectURL(blob);
                    displayMessage(url, 'other-message', new Date(), false, '', false, true, false);
                } else if (box.type === 'VIDEO_CIRCLE') {
                    // КРУЖОЧКИ
                    const blob = new Blob([decryptedBuffer], { type: box.mimeType });
                    const url = URL.createObjectURL(blob);
                    displayMessage(url, 'other-message', new Date(), false, '', false, false, true);
                } else {
                    // КАРТИНКИ И ФАЙЛЫ
                    const blob = new Blob([decryptedBuffer], { type: box.mimeType });
                    const fileUrl = URL.createObjectURL(blob);
                    displayMessage(fileUrl, 'other-message', new Date(), box.type === 'IMAGE', box.fileName);
                }
                socket.emit('mark_read', { sender: payload.sender, recipient: myUsername });
            }
        } catch (e) { console.error("Ошибка пакета", e); }
    });
    
    // --- НОВОЕ: МЕНЯЕМ ОДНУ ГАЛОЧКУ НА ДВЕ В РЕАЛЬНОМ ВРЕМЕНИ ---
    socket.on('messages_were_read', (data) => {
        // Если мы сейчас в чате с тем, кто прочитал наши сообщения
        if (currentChatUser === data.by) {
            document.querySelectorAll('.my-message .msg-status').forEach(el => {
                el.className = 'msg-status status-read';
                el.textContent = '✓✓';
            });
        }
    });
</script>
</body>
</html>
